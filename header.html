<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Site Header · Pure Passion Yoga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="gf-head" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap">
<link id="gf-body" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg:#F3F3F3; --card:#fff; --ink:#5C5664; --head:#3A2E48; --aub:#4A3A5A; --clay:#C8A0A6; --clayDk:#A87C83; --sage:#a8ad91; --line:#ECE7EC;
    --fontHead:'Playfair Display',Georgia,serif; --fontBody:'Poppins',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--fontBody);-webkit-font-smoothing:antialiased}

  /* ===== SITE HEADER (reusable) ===== */
  .ppy-header{position:sticky;top:0;z-index:50;background:color-mix(in srgb, var(--card) 88%, transparent);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line);transition:box-shadow .2s}
  .ppy-header.scrolled{box-shadow:0 6px 24px rgba(74,58,90,.07)}
  .ppy-bar{max-width:1180px;margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:18px}
  .ppy-brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex:0 0 auto}
  .ppy-brand img.logoimg{height:46px;width:auto;display:block}
  .ppy-brand .mark{width:38px;height:38px;flex:0 0 auto}
  .ppy-brand .wordmark{font-family:var(--fontHead);font-weight:700;color:var(--clayDk);font-size:20px;line-height:1}
  .ppy-nav{display:flex;align-items:center;gap:4px;margin-left:6px}
  .ppy-nav a{display:inline-flex;align-items:center;color:var(--head);text-decoration:none;font-size:14.5px;font-weight:500;padding:9px 12px;border-radius:10px;transition:background .15s,color .15s;white-space:nowrap}
  .ppy-nav a:hover{background:#F7F1F5;color:var(--clayDk)}
  .ppy-nav a.locked{color:#A79FAC}
  .ppy-nav a .lock{margin-left:5px;opacity:.7}
  .ppy-right{margin-left:auto;display:flex;align-items:center;gap:8px}
  .ppy-tier{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--clayDk);background:#F7F1F5;border-radius:999px;padding:4px 9px;font-weight:600}
  .ppy-btn{display:inline-flex;align-items:center;gap:7px;text-decoration:none;font-weight:500;font-size:14px;padding:9px 16px;border-radius:11px;white-space:nowrap;transition:filter .15s,background .15s}
  .ppy-btn.primary{background:var(--clayDk);color:#fff}
  .ppy-btn.primary:hover{filter:brightness(.95)}
  .ppy-btn.ghost{background:#fff;color:var(--aub);border:1px solid var(--line)}
  .ppy-btn.ghost:hover{border-color:var(--clay)}
  .ppy-btn.up{background:linear-gradient(135deg,var(--clay),var(--clayDk));color:#fff}
  .ppy-btn.admin{background:#fff;color:var(--clayDk);border:1px solid var(--clay)}
  .ppy-burger{display:none;background:none;border:1px solid var(--line);border-radius:10px;width:42px;height:40px;cursor:pointer;align-items:center;justify-content:center;color:var(--head)}
  .ppy-burger svg{width:22px;height:22px}
  .ppy-mobile{display:none;border-top:1px solid var(--line);background:var(--card)}
  .ppy-mobile a{display:flex;align-items:center;padding:14px 22px;color:var(--head);text-decoration:none;font-weight:500;border-bottom:1px solid var(--line)}
  .ppy-mobile a .lock{margin-left:auto;opacity:.6}
  .ppy-mobile a.up{color:#fff;background:linear-gradient(135deg,var(--clay),var(--clayDk))}
  .ppy-mobile a.admin{color:var(--clayDk)}
  @media (max-width:900px){
    .ppy-nav{display:none}
    .ppy-right .hide-sm{display:none}
    .ppy-burger{display:inline-flex}
    .ppy-mobile.open{display:block}
  }
  /* ===== END HEADER ===== */

  /* demo body */
  .demo{max-width:1180px;margin:0 auto;padding:56px 22px}
  .demo .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--clayDk);font-weight:600}
  .demo h1{font-family:var(--fontHead);color:var(--head);font-size:42px;margin:10px 0 12px;font-weight:700;max-width:15ch}
  .demo p{font-size:16px;max-width:56ch;line-height:1.7}
  .demo .sim{margin-top:30px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px;max-width:520px}
  .demo .sim h3{font-family:var(--fontHead);margin:0 0 10px;color:var(--head);font-size:16px}
  .demo .sim label{display:block;font-size:12px;color:var(--ink);margin:8px 0 4px}
  .demo .sim select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#FAF8FA}
  .demo .accent{height:4px;width:60px;background:linear-gradient(90deg,var(--clay),var(--sage));border-radius:999px;margin:30px 0 0}
</style>
</head>
<body>

<!-- ===== SITE HEADER markup ===== -->
<header class="ppy-header" id="ppyHeader">
  <div class="ppy-bar">
    <a class="ppy-brand" id="ppyBrand" href="#"></a>
    <nav class="ppy-nav" id="ppyNav"></nav>
    <div class="ppy-right" id="ppyRight"></div>
    <button class="ppy-burger" id="ppyBurger" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
  <div class="ppy-mobile" id="ppyMobile"></div>
</header>
<!-- ===== END SITE HEADER ===== -->

<div class="demo">
  <span class="eyebrow">Preview</span>
  <h1>One header, every visitor.</h1>
  <p>The header above changes based on who's looking — signed out, free, each paid tier, or admin. Use the simulator to see all five states without logging in and out. (Live, it reads the real session.)</p>

  <div class="sim">
    <h3>Preview as…</h3>
    <label>Signed in?</label>
    <select id="simAuth"><option value="out">Signed out</option><option value="in">Signed in</option></select>
    <label>Tier</label>
    <select id="simTier"><option value="free">Free</option><option value="practitioner">Practitioner</option><option value="teacher">Teacher</option><option value="ultimate">Ultimate</option></select>
    <label>Admin?</label>
    <select id="simAdmin"><option value="no">No</option><option value="yes">Yes</option></select>
  </div>
  <div class="accent"></div>
</div>

<script>
/* ====== CONFIG (update when you move to your real domain) ====== */
const SUPABASE_URL="https://nxjbpgnpblqepathojzr.supabase.co";
const ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54amJwZ25wYmxxZXBhdGhvanpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTE3MTYsImV4cCI6MjA5MDA2NzcxNn0.0thRMnySyacG_fcFiHlteEk4scwfWrP6HmjSlBdg3Ik";
const URLS = {
  pose_library:     "https://ppyoga-app.vercel.app",
  sequence_builder: "https://ppyoga-builder.vercel.app",
  classes:          "https://ppyoga-app.vercel.app/classes.html",
  challenges:       "https://ppyoga-app.vercel.app/challenges.html",
  community:        "https://ppyoga-app.vercel.app/community.html",
  account:          "https://ppyoga-profile.vercel.app",
  admin:            "https://ppyoga-admin.vercel.app"
};
/* ============================================================== */

const sb = supabase.createClient(SUPABASE_URL, ANON);
const $=id=>document.getElementById(id);
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const LOCK=`<svg class="lock" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>`;
const LOTUS = `<svg class="mark" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <path d="M24 7c2.6 3.2 4 6.7 4 10.2 0 3.8-1.6 7.2-4 9.8-2.4-2.6-4-6-4-9.8C20 13.7 21.4 10.2 24 7Z" fill="var(--clay)"/>
  <path d="M13 14c3.7 1 6.6 2.9 8.6 5.3 2.2 2.6 3.2 5.8 3.1 9-3.4-.6-6.6-2.2-8.8-4.8-2-2.4-3-5.6-2.9-9.5Z" fill="var(--sage)" opacity=".9"/>
  <path d="M35 14c-3.7 1-6.6 2.9-8.6 5.3-2.2 2.6-3.2 5.8-3.1 9 3.4-.6 6.6-2.2 8.8-4.8 2-2.4 3-5.6 2.9-9.5Z" fill="var(--sage)" opacity=".9"/>
  <path d="M8 22c3.6-.2 6.8.6 9.4 2.3 2.7 1.8 4.5 4.4 5.4 7.4-3.4.5-6.8-.1-9.6-1.9C10.7 28.2 9 25.4 8 22Z" fill="var(--clayDk)" opacity=".85"/>
  <path d="M40 22c-3.6-.2-6.8.6-9.4 2.3-2.7 1.8-4.5 4.4-5.4 7.4 3.4.5 6.8-.1 9.6-1.9 2.5-1.6 4.2-4.4 5.2-7.8Z" fill="var(--clayDk)" opacity=".85"/>
  <path d="M12 31c4 0 12 1.6 12 8 0-6.4 8-8 12-8-1.5 5-6.5 9-12 9s-10.5-4-12-9Z" fill="var(--clay)"/></svg>`;

let DESIGN={}, SITE={}, STATE={ signedIn:false, tier:"free", isAdmin:false };

function applyDesign(d){
  const r=document.documentElement.style;
  if(d.color_page_bg) r.setProperty("--bg",d.color_page_bg);
  if(d.color_surface) r.setProperty("--card",d.color_surface);
  if(d.color_body_text) r.setProperty("--ink",d.color_body_text);
  if(d.color_primary){ r.setProperty("--clay",d.color_primary); r.setProperty("--clayDk",d.color_primary); }
  if(d.color_secondary) r.setProperty("--sage",d.color_secondary);
  if(d.font_heading){ r.setProperty("--fontHead","'"+d.font_heading+"',Georgia,serif"); $("gf-head").href="https://fonts.googleapis.com/css2?family="+encodeURIComponent(d.font_heading)+":wght@500;600;700&display=swap"; }
  if(d.font_body){ r.setProperty("--fontBody","'"+d.font_body+"',system-ui,sans-serif"); $("gf-body").href="https://fonts.googleapis.com/css2?family="+encodeURIComponent(d.font_body)+":wght@400;500;600&display=swap"; }
}
const rank=(t)=>{ const o=SITE.tier_order||["free","practitioner","teacher","ultimate"]; const i=o.indexOf(t); return i<0?0:i; };

function render(){
  const name=DESIGN.app_name||"Pure Passion Yoga";
  $("ppyBrand").href=URLS.pose_library;
  $("ppyBrand").innerHTML = DESIGN.logo_url ? `<img class="logoimg" src="${esc(DESIGN.logo_url)}" alt="${esc(name)}">` : `${LOTUS}<span class="wordmark">${esc(name)}</span>`;

  const feats=SITE.features||{};
  const order=["pose_library","sequence_builder","classes","challenges","community"];
  const userRank=rank(STATE.signedIn?STATE.tier:"free");
  const upgradeUrl=SITE.upgrade_url||"#";

  const navItems=order.filter(k=>feats[k]&&feats[k].enabled&&feats[k].nav!==false).map(k=>{
    const f=feats[k], locked=userRank<rank(f.min_tier||"free");
    const href=locked?upgradeUrl:(URLS[k]||"#");
    return `<a href="${esc(href)}" class="${locked?"locked":""}">${esc(f.label||k)}${locked?LOCK:""}</a>`;
  });
  $("ppyNav").innerHTML=navItems.join("");

  // right side
  const tierLabel=(SITE.tier_labels&&SITE.tier_labels[STATE.tier])||STATE.tier;
  let right="";
  if(!STATE.signedIn){
    right=`<a class="ppy-btn primary" href="${esc(URLS.account)}">Sign in</a>`;
  } else {
    if(STATE.isAdmin) right+=`<a class="ppy-btn admin hide-sm" href="${esc(URLS.admin)}">Admin</a>`;
    if(STATE.tier==="free") right+=`<a class="ppy-btn up" href="${esc(upgradeUrl)}">Upgrade</a>`;
    else right+=`<span class="ppy-tier hide-sm">${esc(tierLabel)}</span>`;
    right+=`<a class="ppy-btn ghost" href="${esc(URLS.account)}">My Account</a>`;
  }
  $("ppyRight").innerHTML=right;

  // mobile
  let m=navItems.join("");
  if(!STATE.signedIn){ m+=`<a class="up" href="${esc(URLS.account)}">Sign in</a>`; }
  else {
    if(STATE.isAdmin) m+=`<a class="admin" href="${esc(URLS.admin)}">Admin</a>`;
    if(STATE.tier==="free") m+=`<a class="up" href="${esc(upgradeUrl)}">Upgrade</a>`;
    m+=`<a href="${esc(URLS.account)}">My Account</a>`;
  }
  $("ppyMobile").innerHTML=m;
}

$("ppyBurger").onclick=()=>$("ppyMobile").classList.toggle("open");
addEventListener("scroll",()=>{ $("ppyHeader").classList.toggle("scrolled", scrollY>4); });

// preview simulator (remove when embedding for real)
function syncSim(){ STATE={ signedIn:$("simAuth").value==="in", tier:$("simTier").value, isAdmin:$("simAdmin").value==="yes" }; render(); }
["simAuth","simTier","simAdmin"].forEach(id=>$(id).onchange=syncSim);

(async function(){
  try{ const { data } = await sb.from("app_settings").select("key,value").in("key",["design","site"]);
    (data||[]).forEach(r=>{ if(r.key==="design") DESIGN=r.value||{}; if(r.key==="site") SITE=r.value||{}; });
  }catch(e){}
  applyDesign(DESIGN);
  // real session/profile
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(session){
      STATE.signedIn=true;
      const { data:p } = await sb.from("profiles").select("tier,is_admin").eq("id",session.user.id).maybeSingle();
      if(p){ STATE.tier=p.tier||"free"; STATE.isAdmin=!!p.is_admin; }
      $("simAuth").value="in"; $("simTier").value=STATE.tier; $("simAdmin").value=STATE.isAdmin?"yes":"no";
    }
  }catch(e){}
  render();
})();
</script>
</body>
</html>
